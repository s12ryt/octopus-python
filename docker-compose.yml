version: "3.8"
services:
  octopus-python:
    build: .
    container_name: octopus-python
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - OCTOPUS_SERVER_HOST=0.0.0.0
      - OCTOPUS_SERVER_PORT=8080
      - OCTOPUS_DATABASE_TYPE=sqlite
      - OCTOPUS_DATABASE_PATH=data/data.db
